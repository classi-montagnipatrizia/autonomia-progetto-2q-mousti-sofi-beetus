<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeetUS - Crea Gruppo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-900/50 min-h-screen flex items-center justify-center p-4">

  <!-- ============================================
       MODAL CREA GRUPPO
       ============================================ -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">

    <!-- Header -->
    <header class="sticky top-0 bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between z-10">
      <h2 class="text-xl font-bold text-gray-900">Nuovo gruppo</h2>
      <button class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <!-- Contenuto -->
    <div class="p-6 space-y-5">

      <!-- Icona gruppo + color picker -->
      <div class="flex flex-col items-center">
        <div class="relative mb-4">
          <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold shadow-lg" id="groupIcon">
            OI
          </div>
          <button class="absolute -bottom-1 -right-1 w-8 h-8 bg-white border border-gray-200 rounded-full flex items-center justify-center shadow-sm hover:bg-gray-50 transition-colors">
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
            </svg>
          </button>
        </div>

        <!-- Color picker griglia -->
        <div class="flex gap-2">
          <button class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 ring-2 ring-blue-500 ring-offset-2 transition-all"></button>
          <button class="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-green-600 hover:ring-2 hover:ring-green-500 hover:ring-offset-2 transition-all"></button>
          <button class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-purple-600 hover:ring-2 hover:ring-purple-500 hover:ring-offset-2 transition-all"></button>
          <button class="w-8 h-8 rounded-full bg-gradient-to-br from-orange-500 to-orange-600 hover:ring-2 hover:ring-orange-500 hover:ring-offset-2 transition-all"></button>
          <button class="w-8 h-8 rounded-full bg-gradient-to-br from-pink-500 to-pink-600 hover:ring-2 hover:ring-pink-500 hover:ring-offset-2 transition-all"></button>
          <button class="w-8 h-8 rounded-full bg-gradient-to-br from-cyan-500 to-cyan-600 hover:ring-2 hover:ring-cyan-500 hover:ring-offset-2 transition-all"></button>
        </div>
      </div>

      <!-- Nome gruppo -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Nome del gruppo <span class="text-red-500">*</span></label>
        <input type="text" value="Olimpiadi Informatica" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm" placeholder="Es. Club Robotica"/>
      </div>

      <!-- Descrizione -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Descrizione (opzionale)</label>
        <textarea rows="2" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none text-sm" placeholder="Di cosa si occupa il gruppo?">Preparazione alle Olimpiadi di Informatica</textarea>
      </div>

      <!-- Aggiungi membri -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Aggiungi membri</label>

        <!-- Ricerca -->
        <div class="relative mb-3">
          <input type="text" class="w-full px-4 py-2.5 pl-10 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm" placeholder="Cerca studenti..."/>
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>

        <!-- Info cross-class -->
        <p class="text-xs text-blue-600 bg-blue-50 px-3 py-2 rounded-lg mb-3 flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Puoi aggiungere studenti di qualsiasi classe
        </p>

        <!-- Membri selezionati -->
        <div class="flex flex-wrap gap-2 mb-3">
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-700 rounded-full text-sm">
            Marco Rossi
            <button class="hover:text-blue-900 transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </span>
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-700 rounded-full text-sm">
            Anna Bianchi
            <button class="hover:text-blue-900 transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </span>
          <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 text-blue-700 rounded-full text-sm">
            Luca Verdi
            <button class="hover:text-blue-900 transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </span>
        </div>

        <!-- Suggerimenti studenti -->
        <div class="border border-gray-100 rounded-xl overflow-hidden">
          <div class="flex items-center gap-3 p-3 hover:bg-gray-50 cursor-pointer transition-colors">
            <div class="w-9 h-9 bg-pink-500 rounded-full flex items-center justify-center text-white text-sm font-medium shrink-0">SG</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900">Sara Gialli</p>
              <p class="text-xs text-gray-500">@sara_g &middot; 4IB</p>
            </div>
            <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </div>
          <div class="flex items-center gap-3 p-3 hover:bg-gray-50 cursor-pointer transition-colors border-t border-gray-100">
            <div class="w-9 h-9 bg-cyan-500 rounded-full flex items-center justify-center text-white text-sm font-medium shrink-0">FN</div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900">Francesco Neri</p>
              <p class="text-xs text-gray-500">@fra_neri &middot; 3IA</p>
            </div>
            <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <footer class="sticky bottom-0 bg-white border-t border-gray-100 px-6 py-4 flex gap-3">
      <button class="flex-1 py-3 border border-gray-200 text-gray-700 rounded-full font-medium hover:bg-gray-50 transition-colors text-sm">Annulla</button>
      <button class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-full font-medium transition-colors text-sm shadow-lg shadow-blue-500/25">Crea gruppo</button>
    </footer>

  </div>

</body>
</html>
