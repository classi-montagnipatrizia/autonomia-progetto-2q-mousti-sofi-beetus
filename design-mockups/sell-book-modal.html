<!DOCTYPE html>

  <meta charset="UTF-8">

  <title>BeetUS - Vendi un Libro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
    .upload-progress { animation: progress 2s ease-out forwards; }

<body class="bg-gray-900/50 min-h-screen flex items-center justify-center p-4">

  <!-- ============================================
       MODAL VENDI LIBRO
       ============================================ -->
  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden max-h-[90vh] overflow-y-auto">

    <!-- Header Modal -->
    <header class="sticky top-0 bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between z-10">
      <h2 class="text-xl font-bold text-gray-900">Vendi un libro</h2>
      <button class="p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <!-- Contenuto Modal -->
    <div class="p-6 space-y-6">

      <!-- ============================================
           STEP 1: Upload Foto
           ============================================ -->
      <section>
        <h3 class="font-semibold text-gray-900 mb-3 flex items-center gap-2">
          <span class="w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-xs font-bold">1</span>
          Carica le foto del libro
        </h3>

        <div class="grid grid-cols-2 gap-4">
          <!-- Upload Fronte (stato: vuoto) -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Fronte (copertina) <span class="text-red-500">*</span></label>
            <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:border-blue-400 transition-colors cursor-pointer bg-gray-50 hover:bg-blue-50/50 aspect-[3/4] flex flex-col items-center justify-center">
              <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mb-3">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <p class="text-sm text-gray-600 font-medium">Clicca per caricare</p>
              <p class="text-xs text-gray-400 mt-1">PNG, JPG fino a 5MB</p>
            </div>
          </div>

          <!-- Upload Retro (stato: vuoto) -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Retro (opzionale)</label>
            <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center hover:border-blue-400 transition-colors cursor-pointer bg-gray-50 hover:bg-blue-50/50 aspect-[3/4] flex flex-col items-center justify-center">
              <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center mb-3">
                <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <p class="text-sm text-gray-600 font-medium">Clicca per caricare</p>
              <p class="text-xs text-gray-400 mt-1">PNG, JPG fino a 5MB</p>
            </div>
          </div>
        </div>
      </section>

          </button>

           ============================================ -->
      <div class="bg-green-50 border border-green-100 rounded-xl p-4">
        <div class="flex items-start gap-3">

            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">

            </svg>
          </div>
          <div>
            <p class="font-medium text-green-900 text-sm">Dati generati con successo!</p>
            <p class="text-xs text-green-700 mt-0.5">Controlla e modifica i campi se necessario prima di pubblicare</p>
          </div>
        </div>
      </div>

      <!-- ============================================
           STEP 2: Dati libro
           ============================================ -->
      <section>
        <h3 class="font-semibold text-gray-900 mb-4 flex items-center gap-2">
          <span class="w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-xs font-bold">2</span>
          Informazioni libro
          <span class="ml-auto text-xs text-blue-600 bg-blue-50 px-2.5 py-1 rounded-full flex items-center gap-1.5 font-medium">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            Generato da AI
          </span>
        </h3>

        <div class="space-y-4">
          <!-- Titolo -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Titolo <span class="text-red-500">*</span></label>
            <input type="text" value="Matematica Blu 2.0 - Volume 3" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm" placeholder="Es. Matematica Blu 2.0"/>
          </div>

          <!-- Autore -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Autore <span class="text-red-500">*</span></label>
            <input type="text" value="Bergamini, Barozzi, Trifone" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm" placeholder="Es. Bergamini, Barozzi"/>
          </div>

          <!-- ISBN -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">ISBN (opzionale)</label>
            <input type="text" value="9788808537010" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm font-mono" placeholder="Es. 9788808537010"/>
          </div>

          <!-- Riga: Anno e Materia -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Anno <span class="text-red-500">*</span></label>
              <select class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer bg-white text-sm">
                <option value="">Seleziona</option>
                <option value="1">1° Anno</option>
                <option value="2">2° Anno</option>
                <option value="3" selected>3° Anno</option>
                <option value="4">4° Anno</option>
                <option value="5">5° Anno</option>
                <option value="all">Tutti gli anni</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Materia <span class="text-red-500">*</span></label>
              <select class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer bg-white text-sm">
                <option value="">Seleziona</option>
                <option value="matematica" selected>Matematica</option>
                <option value="italiano">Italiano</option>
                <option value="inglese">Inglese</option>
                <option value="storia">Storia</option>
                <option value="fisica">Fisica</option>
                <option value="informatica">Informatica</option>
                <option value="altro">Altro</option>
              </select>
            </div>
          </div>

          <!-- Riga: Prezzo e Condizione -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">
                Prezzo <span class="text-red-500">*</span>
                <span class="text-blue-500 text-xs ml-1 font-normal">(AI: &euro;15)</span>
              </label>
              <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-medium">&euro;</span>
                <input type="number" value="15" min="0" step="0.50" class="w-full pl-8 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-sm"/>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Condizione <span class="text-red-500">*</span></label>
              <select class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer bg-white text-sm">
                <option value="">Seleziona</option>
                <option value="nuovo" selected>Come nuovo</option>
                <option value="buono">Buone condizioni</option>
                <option value="usato">Usato</option>
              </select>
            </div>
          </div>

          <!-- Descrizione -->
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Descrizione</label>
            <textarea rows="3" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none text-sm" placeholder="Descrivi le condizioni del libro...">Libro in ottime condizioni, usato per un solo anno scolastico. Nessuna sottolineatura o appunti. Copertina integra, senza pieghe o strappi.</textarea>
            <div class="flex items-center justify-between mt-1.5">
              <span class="text-xs text-blue-500 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                Generata da AI
              </span>
              <span class="text-xs text-gray-400">178/500</span>
            </div>
          </div>


          <!-- ============================================
               STATO: Campo con errore di validazione
               (Decommentare per vedere)
               ============================================ -->

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Titolo <span class="text-red-500">*</span></label>
            <input type="text" value="" class="w-full px-4 py-3 border-2 border-red-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all text-sm bg-red-50" placeholder="Es. Matematica Blu 2.0"/>
            <p class="text-xs text-red-500 mt-1.5 flex items-center gap-1">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.732-.833-2.5 0L4.268 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
              Il titolo e' obbligatorio
            </p>
          </div>
          -->

        </div>
      </section>

    </div>

    <!-- Footer Modal -->
    <footer class="sticky bottom-0 bg-white border-t border-gray-100 px-6 py-4 flex gap-3">
      <button class="flex-1 py-3 border border-gray-200 text-gray-700 rounded-full font-medium hover:bg-gray-50 transition-colors text-sm">
        Annulla
      </button>
      <button class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-full font-medium transition-colors shadow-lg shadow-blue-500/25 flex items-center justify-center gap-2 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        Pubblica annuncio
