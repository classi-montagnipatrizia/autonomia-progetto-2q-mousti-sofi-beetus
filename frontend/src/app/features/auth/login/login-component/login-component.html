<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 relative overflow-hidden">
  <!-- Sfondo decorativo -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-500/10 dark:bg-primary-500/5 blur-[120px]"></div>
    <div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-purple-500/10 dark:bg-purple-500/5 blur-[100px]"></div>
  </div>

  <div class="w-full max-w-md flex flex-col items-center relative z-10">
    <!-- Logo e titolo -->
    <div class="mb-8 text-center animate-fade-in-up">
      <a routerLink="/" class="inline-flex items-center justify-center gap-3 hover:opacity-80 transition-opacity duration-300">
        <img src="images/beetUs_logo.svg" alt="beetUs Logo" class="h-14 w-14 sm:h-16 sm:w-16 rounded-2xl" />
        <span class="text-3xl sm:text-4xl font-black text-gray-900 dark:text-white tracking-tight">
          beetUs
        </span>
      </a>
      <p class="mt-3 text-base font-medium text-gray-500 dark:text-gray-400">
        Bentornato! Connettiti con la tua classe
      </p>
    </div>

    <!-- Card login -->
    <div class="w-full bg-white/70 dark:bg-gray-800/60 backdrop-blur-2xl rounded-[32px] border border-white/20 dark:border-gray-700/50 p-8 shadow-[0_8px_40px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_40px_rgb(0,0,0,0.12)]">
      <div class="flex flex-col space-y-6">

        <!-- Messaggio info verifica email -->
        @if (verificationInfoMessage()) {
          <div class="p-4 rounded-lg bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800">
            <p class="text-sm text-blue-700 dark:text-blue-300">
              {{ verificationInfoMessage() }}
            </p>
          </div>
        }

        <!-- Messaggio errore globale -->
        @if (errorMessage()) {
          <div class="p-4 rounded-lg bg-error-50 dark:bg-error-900/30 border border-error-200 dark:border-error-800">
            <p class="text-sm text-error-700 dark:text-error-300">
              {{ errorMessage() }}
            </p>
          </div>
        }

        <!-- Form login -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4">
          <!-- Campo username -->
          <app-input-component
            formControlName="username"
            label="Username"
            placeholder="Inserisci il tuo username"
            [required]="true"
            [error]="getFieldError('username')"
            autocomplete="username"
            size="lg"
          />

          <!-- Campo password -->
          <app-input-component
            formControlName="password"
            type="password"
            label="Password"
            placeholder="Inserisci la tua password"
            [required]="true"
            [error]="getFieldError('password')"
            autocomplete="current-password"
            size="lg"
          />

          <!-- Pulsante login -->
          <app-button
            type="submit"
            variant="primary"
            size="lg"
            [fullWidth]="true"
            [loading]="isLoading()"
            [disabled]="loginForm.invalid && loginForm.touched"
          >
            Accedi
          </app-button>
        </form>

        <!-- Form reinvio verifica email -->
        @if (showResendForm()) {
          <div class="p-4 rounded-lg bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800">
            <h3 class="text-sm font-semibold text-blue-900 dark:text-blue-100 mb-3">
              Non hai ricevuto l'email di verifica?
            </h3>
            <form [formGroup]="resendForm" (ngSubmit)="resendVerificationEmail()" class="space-y-3">
              <app-input-component
                formControlName="email"
                type="email"
                placeholder="Email @marconirovereto.it"
                [error]="getResendFieldError('email')"
                size="sm"
              />
              <div class="flex gap-2">
                <app-button
                  type="button"
                  variant="secondary"
                  size="sm"
                  (click)="toggleResendForm()"
                  [disabled]="isResending()"
                >
                  Annulla
                </app-button>
                <app-button
                  type="submit"
                  variant="primary"
                  size="sm"
                  [loading]="isResending()"
                  [disabled]="isResending()"
                >
                  Reinvia Email
                </app-button>
              </div>
            </form>
          </div>
        }

        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 pt-6 mt-4 border-t border-gray-100 dark:border-gray-700/50 text-sm">
          <a
            routerLink="/auth/reset-password"
            class="font-medium text-primary-600 dark:text-primary-400 hover:text-primary-700 dark:hover:text-primary-300 hover:underline transition-colors"
          >
            Password dimenticata?
          </a>
          <a
            routerLink="/auth/register"
            class="font-medium text-primary-600 dark:text-primary-400 hover:text-primary-700 dark:hover:text-primary-300 hover:underline transition-colors flex items-center gap-1 group"
          >
            Registrati
            <lucide-icon [img]="ChevronRightIcon" [size]="16" class="group-hover:translate-x-1 transition-transform" />
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
