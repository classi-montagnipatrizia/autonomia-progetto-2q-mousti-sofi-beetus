<div class="group-list-shell h-full flex flex-col bg-transparent overflow-hidden">

  <!-- Header con tab -->
  <header class="group-list-header flex-shrink-0 px-4 sm:px-6 py-4 border-b border-white/20 dark:border-gray-700/50">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <button
          type="button"
          (click)="goBack()"
          class="p-2 -ml-2 rounded-full hover:bg-white/50 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400 transition-colors"
          aria-label="Torna alla home"
        >
          <lucide-icon [img]="ArrowLeftIcon" [size]="24" />
        </button>
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300">Messaggi</h1>
      </div>
      <button
        type="button"
        (click)="openCreateModal()"
        class="p-2 rounded-full bg-primary-50 hover:bg-primary-100 dark:bg-primary-500/20 dark:hover:bg-primary-500/30 transition-all text-primary-600 dark:text-primary-400 shadow-sm hover:shadow active:scale-95"
        title="Nuovo gruppo"
      >
        <lucide-icon [img]="PlusIcon" [size]="20" />
      </button>
    </div>

    <!-- Tab bar: Chat | Gruppi -->
    <div class="messages-tabs flex bg-white/40 dark:bg-gray-900/40 backdrop-blur-md rounded-[16px] p-1 border border-white/20 dark:border-gray-700/50 shadow-sm">
      <button
        type="button"
        (click)="tabChanged.emit('chat')"
        class="flex-1 py-2 px-4 text-sm font-medium rounded-[12px] text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-all"
      >Chat</button>
      <button
        type="button"
        class="flex-1 py-2 px-4 text-sm font-medium rounded-[12px] bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm transition-all"
      >Gruppi</button>
    </div>
  </header>

  <!-- Lista gruppi -->
  <div class="group-list-scroll flex-1 min-h-0 overflow-y-auto pt-2 pb-4 px-2 sm:px-4">

    <!-- Loading -->
    @if (groupStore.isLoading()) {
      <div class="space-y-2">
        @for (i of [1, 2, 3]; track i) {
          <div class="flex items-center gap-4 p-4 rounded-[20px] bg-white/30 dark:bg-gray-800/30 backdrop-blur-md border border-white/20 dark:border-gray-700/50">
            <div class="w-14 h-14 bg-gray-200 dark:bg-gray-700 rounded-[16px] animate-pulse"></div>
            <div class="flex-1 space-y-2.5">
              <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded-lg w-2/3 animate-pulse"></div>
              <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded-lg w-4/5 animate-pulse"></div>
            </div>
          </div>
        }
      </div>
    }

    <!-- Empty state -->
    @if (isEmpty()) {
      <div class="flex flex-col items-center justify-center h-full p-8 text-center">
        <div class="bg-white/50 dark:bg-gray-800/50 backdrop-blur-md rounded-3xl p-8 border border-white/20 dark:border-gray-700/50 shadow-sm max-w-sm mx-auto">
          <div class="w-20 h-20 mx-auto mb-5 rounded-[24px] bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl border border-white/20 dark:border-gray-700/50 shadow-lg flex items-center justify-center">
            <lucide-icon [img]="UsersIcon" [size]="40" class="text-gray-400 dark:text-gray-500" />
          </div>
          <h3 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300 mb-3">
            Nessun gruppo
          </h3>
          <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed mb-6">
            Crea il tuo primo gruppo per chattare con più persone.
          </p>
          <button
            type="button"
            (click)="openCreateModal()"
            class="px-6 py-3 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white rounded-xl text-sm font-semibold transition-all shadow-md active:scale-95 w-full"
          >
            Crea gruppo
          </button>
        </div>
      </div>
    }

    <!-- Lista gruppi -->
    @if (!groupStore.isLoading() && !isEmpty()) {
      <div class="space-y-1.5 mt-2">
        @for (group of groupStore.myGroups(); track group.id) {
          <div class="rounded-[20px] overflow-hidden bg-white/20 dark:bg-gray-800/20 hover:bg-white/50 dark:hover:bg-gray-700/40 backdrop-blur-sm border border-transparent hover:border-white/30 dark:hover:border-gray-600/50 transition-all"
               [class.bg-white/70]="selectedGroupId() === group.id"
               [class.dark:bg-gray-700]="selectedGroupId() === group.id"
               [class.shadow-sm]="selectedGroupId() === group.id"
               [class.border-white/40]="selectedGroupId() === group.id"
               [class.dark:border-gray-600]="selectedGroupId() === group.id">
            <button
              type="button"
              (click)="openGroup(group)"
              class="group-row w-full flex items-center gap-4 p-4 cursor-pointer text-left focus:outline-none"
            >
              <!-- Avatar: foto o colore+iniziali -->
              @if (group.profilePictureUrl) {
                <img
                  [src]="group.profilePictureUrl"
                  [alt]="group.name"
                  class="w-14 h-14 rounded-[16px] object-cover shrink-0 shadow-sm border border-white/20 dark:border-gray-700/50"
                />
              } @else {
                <div
                  class="w-14 h-14 bg-gradient-to-br rounded-[16px] flex items-center justify-center text-white font-bold shrink-0 shadow-sm border border-white/20 dark:border-gray-700/50"
                  [class]="getAvatarColor(group.id).from + ' ' + getAvatarColor(group.id).to"
                >{{ getInitials(group.name) }}</div>
              }

              <div class="flex-1 min-w-0 pr-2">
                <div class="flex items-center justify-between mb-1">
                  <p class="font-bold text-[15px] text-gray-900 dark:text-white truncate pr-2">{{ group.name }}</p>
                  @if (group.lastMessageAt) {
                    <span class="text-[11px] font-medium text-gray-500 whitespace-nowrap bg-black/5 dark:bg-white/5 py-1 px-2 rounded-lg shrink-0">
                      {{ group.lastMessageAt | timeAgo }}
                    </span>
                  }
                </div>
                <!-- Anteprima ultimo messaggio -->
                <div class="flex items-center justify-between mt-0.5 whitespace-nowrap overflow-hidden text-ellipsis">
                  @if (group.lastMessageContent) {
                    <p class="text-sm text-gray-500 dark:text-gray-400 truncate">{{ group.lastMessageContent }}</p>
                  } @else {
                    <p class="text-sm text-gray-400 dark:text-gray-500 italic truncate">Nessun messaggio</p>
                  }
                  
                  <!-- Badge unread spostato qui a destra del messaggio per layout più pulito -->
                  @if (group.unreadCount > 0) {
                    <span class="ml-2 px-2 py-0.5 bg-gradient-to-br from-primary-500 to-primary-600 shadow-sm text-white text-[11px] font-bold rounded-full flex items-center justify-center shrink-0">
                      {{ group.unreadCount > 9 ? '9+' : group.unreadCount }}
                    </span>
                  }
                </div>
              </div>
            </button>
          </div>
        }
      </div>
    }
  </div>

  <!-- Create group modal -->
  <app-create-group-modal
    [isOpen]="showCreateModal()"
    (closed)="showCreateModal.set(false)"
    (submitted)="onGroupCreated($event)"
  />
</div>
