<!-- Container toast posizionato in alto a destra -->
<div class="fixed top-4 sm:top-6 right-0 sm:right-6 z-[100] flex flex-col gap-3 w-full px-4 sm:px-0 sm:w-[380px] pointer-events-none">

  <!-- Itera su tutti i toast attivi-->
  @for (toast of toasts(); track toast.id) {
    <div
      animate.enter="toast-enter"
      animate.leave="toast-leave"
      [ngClass]="getToastClasses(toast.type)"
      class="pointer-events-auto w-full group relative overflow-hidden"
      role="alert"
      [attr.aria-live]="toast.type === 'error' ? 'assertive' : 'polite'"
    >
      
      <!-- Icona decorativa in background sfocata (effetto glass) -->
      <div 
        class="absolute -right-4 -top-4 opacity-[0.07] dark:opacity-[0.1] pointer-events-none transition-transform group-hover:scale-110"
        [ngClass]="getIconClasses(toast.type)"
      >
        <lucide-icon [img]="getIcon(toast.type)" [size]="80" strokeWidth="1.5" />
      </div>

      <div class="flex items-start gap-3 relative z-10 w-full">
        <!-- Icona del toast -->
        <div [ngClass]="getIconClasses(toast.type)" class="mt-0.5 bg-white/40 dark:bg-black/20 p-2 rounded-full shadow-inner border border-white/20 dark:border-white/5">
          <lucide-icon 
            [img]="getIcon(toast.type)" 
            [size]="20"
            strokeWidth="2.5"
          />
        </div>

        <!-- Contenuto messaggio -->
        <div class="flex-1 text-[14px] sm:text-[15px] font-semibold leading-snug break-words pt-1 max-w-[calc(100%-3rem)]">
          {{ toast.message }}
        </div>

        <!-- Pulsante chiudi (se dismissible) -->
        @if (toast.dismissible) {
          <button
            type="button"
            (click)="dismiss(toast.id)"
            class="shrink-0 p-1.5 -mr-1 -mt-0.5 rounded-full opacity-60 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/10 transition-all focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-current active:scale-95"
            aria-label="Chiudi notifica"
          >
            <lucide-icon 
              [img]="X" 
              [size]="18"
            />
          </button>
        }
      </div>
    </div>
  }

</div>
