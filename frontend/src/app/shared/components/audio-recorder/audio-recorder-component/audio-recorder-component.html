<!-- Stato: idle -->
@if (state() === 'idle') {
  <button
    type="button"
    class="flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 hover:bg-white dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400 transition-all duration-300 cursor-pointer shadow-sm hover:shadow-md active:scale-90 focus:outline-none focus:ring-2 focus:ring-primary-500/20 group"
    (click)="startRecording()"
    aria-label="Avvia registrazione vocale"
    title="Registra messaggio vocale"
  >
    <lucide-icon [img]="MicIcon" [size]="20" class="transition-transform group-hover:scale-110" />
  </button>
}

<!-- Stato: recording -->
@if (state() === 'recording') {
  <div class="flex items-center justify-between gap-3 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-md rounded-[20px] px-3 sm:px-4 py-2.5 shadow-md border border-red-100 dark:border-red-900/30 min-w-[240px] animate-fade-in">
    <!-- Indicatore pulsante rosso animato + Timer -->
    <div class="flex items-center gap-2.5">
      <div class="relative flex items-center justify-center w-3 h-3">
        <span class="absolute inline-flex w-full h-full rounded-full bg-red-500 opacity-75 animate-ping"></span>
        <span class="relative inline-flex rounded-full w-2 h-2 bg-red-500"></span>
      </div>
      <span class="text-[13px] font-mono font-bold tracking-tight text-red-600 dark:text-red-400 min-w-[40px]">
        {{ timerLabel() }}
      </span>
    </div>

    <!-- Barra + Countdown a destra -->
    <div class="flex-1 min-w-[80px] flex items-center gap-2">
      <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden shadow-inner-sm">
        <div
          class="h-full rounded-full transition-all duration-1000 bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]"
          [style.width.%]="timerPercent()"
        ></div>
      </div>
      <span
        class="text-[12px] font-semibold w-8 text-right"
        [class.text-red-500]="secondsLeft() <= 10"
        [class.text-amber-500]="secondsLeft() > 10 && secondsLeft() <= 30"
        [class.text-gray-400]="secondsLeft() > 30"
      >
        -{{ secondsLeft() }}s
      </span>
    </div>

    <!-- Stop -->
    <button
      type="button"
      class="flex items-center justify-center w-8 h-8 rounded-full bg-red-50 hover:bg-red-100 dark:bg-red-900/30 dark:hover:bg-red-900/50 text-red-600 dark:text-red-400 transition-all duration-200 cursor-pointer shrink-0 active:scale-90 hover:shadow-sm"
      (click)="stopRecording()"
      aria-label="Ferma registrazione"
    >
      <lucide-icon [img]="SquareIcon" [size]="14" class="fill-current" />
    </button>
  </div>
}

<!-- Stato: recorded -->
@if (state() === 'recorded') {
  <div class="flex items-center gap-3 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-md rounded-[20px] px-3 sm:px-4 py-2.5 shadow-md border border-primary-100 dark:border-primary-900/30 animate-fade-in min-w-[240px]">
    <!-- Info -->
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-full bg-primary-50 dark:bg-primary-900/40 flex items-center justify-center shrink-0">
        <lucide-icon [img]="MicIcon" [size]="15" class="text-primary-600 dark:text-primary-400" />
      </div>
      <div class="flex flex-col">
        <span class="text-[11px] font-medium text-primary-600/80 dark:text-primary-400/80 uppercase tracking-wider">
          Registrazione
        </span>
        <span class="text-[13px] font-bold font-mono text-gray-800 dark:text-gray-200 leading-none mt-0.5">
          {{ timerLabel() }}
        </span>
      </div>
    </div>

    <div class="flex-1"></div>

    <!-- Azioni -->
    <div class="flex items-center gap-1.5 shrink-0">
      <!-- Scarta -->
      <button
        type="button"
        class="flex items-center justify-center w-8 h-8 rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all cursor-pointer active:scale-90"
        (click)="discard()"
        aria-label="Elimina registrazione"
      >
        <lucide-icon [img]="Trash2Icon" [size]="16" />
      </button>

      <!-- Invia -->
      <button
        type="button"
        class="flex items-center justify-center w-9 h-9 rounded-full bg-primary-500 hover:bg-primary-600 text-white transition-all cursor-pointer shadow-sm hover:shadow-md hover:-translate-y-px active:scale-90 active:translate-y-0"
        (click)="send()"
        aria-label="Invia messaggio vocale"
      >
        <lucide-icon [img]="SendIcon" [size]="16" class="ml-0.5" />
      </button>
    </div>
  </div>
}

<!-- Stato: uploading -->
@if (state() === 'uploading') {
  <div class="flex items-center gap-3 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-md rounded-[20px] px-3 sm:px-4 py-2.5 shadow-md border border-primary-100 dark:border-primary-900/30 animate-fade-in min-w-[240px]">
    <div class="relative w-8 h-8 flex items-center justify-center shrink-0">
      <span class="absolute inset-0 border-2 border-primary-500/20 rounded-full"></span>
      <span class="absolute inset-0 border-2 border-primary-500 border-t-transparent rounded-full animate-spin"></span>
      <lucide-icon [img]="MicIcon" [size]="12" class="text-primary-500/50" />
    </div>
    
    <div class="flex-1 min-w-[80px]">
      <div class="flex items-center justify-between mb-1.5">
        <p class="text-[11px] font-bold text-primary-600/80 dark:text-primary-400/80 uppercase tracking-wide">
          Invio in corso...
        </p>
        <span class="text-[12px] font-mono font-semibold text-primary-500 shrink-0">{{ uploadProgress() }}%</span>
      </div>
      <div class="w-full h-1.5 bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden shadow-inner-sm">
        <div
          class="h-full bg-primary-500 rounded-full transition-all duration-300 shadow-[0_0_8px_rgba(59,130,246,0.6)]"
          [style.width.%]="uploadProgress()"
        ></div>
      </div>
    </div>
  </div>
}
