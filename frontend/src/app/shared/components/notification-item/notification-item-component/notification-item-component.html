<div
  [ngClass]="containerClasses()"
  appDebounceClick="300"
  (debounceClick)="onClick()"
  (keyup.enter)="onClick()"
  tabindex="0"
  role="button"
>
  <!-- Avatar utente -->
  <div class="relative flex-shrink-0 mt-0.5">
    <app-avatar
      [src]="triggerProfilePictureUrl()"
      [name]="triggerNomeCompleto()"
      size="md"
      status="none"
    />

    <!-- Badge icona tipo notifica -->
    <div
      class="absolute -bottom-1.5 -right-1.5 w-[26px] h-[26px] rounded-full bg-white/90 dark:bg-gray-800/90 backdrop-blur-md flex items-center justify-center shadow-sm border border-white/50 dark:border-gray-700/50 transition-transform group-hover:scale-110"
    >
      <lucide-icon [img]="icon()" [ngClass]="iconColorClasses()" class="w-3.5 h-3.5" />
    </div>
  </div>

  <!-- Contenuto notifica -->
  <div class="flex-1 min-w-0 flex flex-col justify-center">
    <p class="text-[14.5px] leading-snug text-gray-800 dark:text-gray-200">
      <!-- Username in grassetto -->
      <span class="font-bold text-gray-900 dark:text-white">{{ triggerNomeCompleto() }}</span>
      <!-- Contenuto della notifica -->
      <span class="font-medium text-gray-600 dark:text-gray-300 ml-1">{{ contenuto() }}</span>
    </p>

    <!-- Timestamp -->
    <p class="text-[12px] font-medium text-gray-400 dark:text-gray-500 mt-1 transition-colors group-hover:text-primary-600 dark:group-hover:text-primary-400 flex items-center gap-1">
      <app-time-ago [date]="createdAt()" />
    </p>
  </div>

  <!-- Indicatore non letta -->
  @if (!isRead()) {
    <div class="flex items-center justify-center h-full pt-2 pl-1 sm:pl-2">
      <div
        class="w-3 h-3 rounded-full bg-primary-500 shadow-[0_0_8px_theme(colors.primary.500/60)] flex-shrink-0 animate-pulse"
        aria-label="Notifica non letta"
      ></div>
    </div>
  }
</div>
