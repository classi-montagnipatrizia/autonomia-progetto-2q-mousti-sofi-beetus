<div class="space-y-2 relative">
  <!-- Reply indicator -->
  @if (isReplyMode()) {
    <div class="flex items-center justify-between px-4 py-2.5 bg-primary-50/80 dark:bg-primary-900/20 backdrop-blur-sm rounded-xl border border-primary-100 dark:border-primary-800/50 animate-fade-in shadow-inner-sm">
      <div class="flex items-center gap-2">
        <lucide-icon [img]="ReplyIcon" [size]="16" class="text-primary-500 dark:text-primary-400"></lucide-icon>
        <span class="text-sm font-medium text-primary-700 dark:text-primary-300">
          Risposta a
          <span class="font-bold">
            &#64;{{ replyTo()?.autore?.username }}
          </span>
        </span>
      </div>
      <button
        type="button"
        class="p-1.5 rounded-full text-primary-600 dark:text-primary-400 hover:bg-primary-100 dark:hover:bg-primary-500/20 transition-all duration-200 active:scale-95 focus:outline-none"
        (click)="cancel()"
      >
        <lucide-icon [img]="XIcon" [size]="16"></lucide-icon>
      </button>
    </div>
  }

  <!-- Form -->
  <div class="flex gap-3 p-3 sm:p-4 bg-gray-50/80 dark:bg-gray-800/30 backdrop-blur-md rounded-[20px] transition-all duration-300 border border-gray-200/50 dark:border-gray-700/50 focus-within:bg-white focus-within:shadow-sm focus-within:border-primary-500/30">
    <!-- Avatar utente corrente -->
    @if (currentUser(); as user) {
      <div class="shrink-0 mt-0.5">
        <app-avatar
          [src]="user.profilePictureUrl"
          [alt]="user.nomeCompleto"
          [name]="user.nomeCompleto"
          size="sm"
          status="online"
          class="transition-transform hover:scale-105"
        />
      </div>
    }

    <!-- Input area -->
    <div class="flex-1 flex gap-2 relative">
      <div class="flex-1 relative">
        <textarea
          #textareaEl
          appAutoResize
          [minRows]="1"
          [maxRows]="5"
          class="w-full px-3 py-2 text-[15px] bg-transparent text-gray-900 dark:text-white rounded-xl resize-none focus:outline-none transition-all placeholder:text-gray-400/80 dark:placeholder:text-gray-500"
          [placeholder]="dynamicPlaceholder()"
          [value]="content()"
          (input)="onInput($event)"
          (keydown)="onKeydown($event)"
        ></textarea>

        <!-- Mention Autocomplete Dropdown -->
        <app-mention-autocomplete-component
          #mentionAutocomplete
          [searchTerm]="mentionSearchTerm()"
          [show]="showMentionDropdown()"
          [position]="{ top: -220, left: 0 }"
          (userSelected)="onMentionSelected($event)"
          (close)="closeMentionDropdown()"
        />
      </div>

      <!-- Submit button -->
      <button
        type="button"
        class="shrink-0 h-10 w-10 flex items-center justify-center rounded-full transition-all duration-300 self-end shadow-sm active:scale-90"
        [class]="isSubmitDisabled()
          ? 'text-gray-400 cursor-not-allowed bg-gray-200/60 dark:bg-gray-700/50 shadow-none'
          : 'text-white bg-primary-500 hover:bg-primary-600 hover:shadow-md hover:scale-105'"
        [disabled]="isSubmitDisabled()"
        (click)="submit()"
      >
        <lucide-icon [img]="SendIcon" [size]="18" class="ml-[2px] transition-transform" [class.group-hover:-translate-y-0.5]="!isSubmitDisabled()"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Hint -->
  <p class="text-[12px] font-medium text-gray-400/80 dark:text-gray-500 text-right px-2 mt-1">
    Ctrl + Invio per inviare
  </p>
</div>
