<div class="flex items-center gap-3 w-full min-w-[200px] max-w-[280px] bg-white/50 dark:bg-gray-800/30 backdrop-blur-sm border border-gray-100 dark:border-gray-700/50 p-2 sm:p-2.5 rounded-2xl shadow-sm transition-all hover:bg-white/80 dark:hover:bg-gray-800/50">
  <!-- Pulsante play/pause (Spostato a sinistra per usabilità standard) -->
  <button
    type="button"
    class="flex items-center justify-center w-10 h-10 rounded-full transition-all duration-300 cursor-pointer shrink-0 disabled:opacity-50 active:scale-95 shadow-sm hover:shadow-md focus:outline-none"
    [ngClass]="iconBgClass()"
    (click)="togglePlay()"
    [disabled]="isLoading()"
    [attr.aria-label]="isPlaying() ? 'Pausa' : 'Riproduci'"
  >
    @if (isLoading()) {
      <span
        class="inline-block w-4 h-4 border-2 border-t-transparent rounded-full animate-spin"
        [ngClass]="iconClass()"
      ></span>
    } @else if (isPlaying()) {
      <lucide-icon [img]="PauseIcon" [size]="18" [ngClass]="iconClass()" class="transition-transform active:scale-90" />
    } @else {
      <lucide-icon [img]="PlayIcon" [size]="18" [ngClass]="iconClass()" class="ml-0.5 transition-transform active:scale-90" />
    }
  </button>

  <!-- Corpo player -->
  <div class="flex-1 min-w-0 flex flex-col justify-center">
    <!-- Componente forma d'onda decorativa (visualizzato tramite track/progress) -->
    <div class="relative flex items-center h-4 group cursor-pointer touch-manipulation">
      <!-- Track (SFONDO) -->
      <div
        class="absolute inset-0 my-auto h-1.5 rounded-full transition-colors group-hover:h-2 duration-300"
        [ngClass]="trackClass()"
      ></div>

      <!-- Fill (PROGRESSO) -->
      <div
        class="absolute left-0 my-auto h-1.5 rounded-full transition-all duration-100 pointer-events-none group-hover:h-2"
        [ngClass]="progressBarClass()"
        [style.width.%]="progressPercent()"
      >
        <!-- Pallino indicatore (thumb) -->
        <div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-sm scale-0 group-hover:scale-100 transition-transform duration-200"></div>
      </div>

      <!-- Range input (invisibile ma cliccabile) -->
      <input
        type="range"
        min="0"
        max="100"
        [value]="progressPercent()"
        (input)="onSeek($event)"
        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
        aria-label="Avanzamento audio"
      />
    </div>

    <!-- Metadati (Mic + Tempo rimasto) -->
    <div class="flex flex-row items-center justify-between mt-1 text-[11px] sm:text-[12px] font-medium opacity-80" [ngClass]="textClass()">
      <div class="flex items-center gap-1">
        <lucide-icon [img]="MicIcon" [size]="12" />
        <span>Audio</span>
      </div>
      <span class="font-mono tracking-tight text-[11px]">
        {{ timeLabel() }}
      </span>
    </div>
  </div>
</div>
