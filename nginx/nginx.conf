# Sostituisci TUODOMINIO con il tuo dominio DuckDNS (es. beetus-mousti.duckdns.org)
# Comando: sed -i 's/TUODOMINIO/beetus-tuonome.duckdns.org/g' nginx/nginx.conf

server {
    listen 80;
    server_name TUODOMINIO;

    # Percorso per la validazione Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect tutto il resto su HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name TUODOMINIO;

    ssl_certificate     /etc/letsencrypt/live/TUODOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TUODOMINIO/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Dimensione massima body (upload immagini)
    client_max_body_size 20M;

    # API REST
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (STOMP su SockJS)
    location /ws {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # Actuator health check (opzionale: limita accesso)
    location /actuator/ {
        proxy_pass       http://backend:8080;
        proxy_set_header Host $host;
    }
}
